// 错误定义示例
syntax = "proto3";
package user.v1;

import "errors/errors.proto";

option go_package = "github.com/example/user/api/user/v1;v1";

// 错误原因枚举
enum ErrorReason {
    // 设置默认错误码（当未指定 code 时使用）
    option (errors.default_code) = 500;
    
    // ========== 400 - 客户端错误 ==========
    
    // 用户名格式错误
    USER_NAME_EMPTY = 0 [(errors.code) = 400];
    USER_NAME_TOO_LONG = 1 [(errors.code) = 400];
    INVALID_EMAIL_FORMAT = 2 [(errors.code) = 400];
    PASSWORD_TOO_SHORT = 3 [(errors.code) = 400];
    PASSWORD_TOO_WEAK = 4 [(errors.code) = 400];
    
    // ========== 401 - 未认证 ==========
    
    UNAUTHORIZED = 10 [(errors.code) = 401];
    TOKEN_EXPIRED = 11 [(errors.code) = 401];
    TOKEN_INVALID = 12 [(errors.code) = 401];
    
    // ========== 403 - 禁止访问 ==========
    
    FORBIDDEN = 20 [(errors.code) = 403];
    PERMISSION_DENIED = 21 [(errors.code) = 403];
    
    // ========== 404 - 资源不存在 ==========
    
    USER_NOT_FOUND = 30 [(errors.code) = 404];
    EMAIL_NOT_FOUND = 31 [(errors.code) = 404];
    
    // ========== 409 - 资源冲突 ==========
    
    USER_ALREADY_EXISTS = 40 [(errors.code) = 409];
    EMAIL_ALREADY_REGISTERED = 41 [(errors.code) = 409];
    USER_NAME_ALREADY_TAKEN = 42 [(errors.code) = 409];
    
    // ========== 429 - 请求过多 ==========
    
    RATE_LIMITED = 50 [(errors.code) = 429];
    
    // ========== 500 - 服务端错误 ==========
    
    INTERNAL_ERROR = 60 [(errors.code) = 500];
    DATABASE_ERROR = 61 [(errors.code) = 500];
    CACHE_ERROR = 62 [(errors.code) = 500];
    THIRD_PARTY_ERROR = 63 [(errors.code) = 500];
}
